version: '3.8'

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    # Compose dynamically injects these from your .env file
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  cache:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: .
    restart: unless-stopped
    # This tells Docker to load all variables from the .env file
    # directly into the Rust application's environment.
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - db
      - cache

volumes:
  pgdata:
  redisdata:
