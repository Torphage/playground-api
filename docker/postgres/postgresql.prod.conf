# --- Preloaded Libraries ---
shared_preload_libraries = 'pgaudit, pg_stat_statements, auto_explain'

# --- Logging (Developer Visibility & Alloy Scraping) ---
# Disable the collector to keep logs in the standard output/error stream
logging_collector = off

# Use 'stderr' for terminal visibility.
# You can also use 'csvlog' if Alloy is specifically configured to tail CSV files.
log_destination = 'stderr'

# Log every query for deep SQLx and pgaudit debugging
log_min_duration_statement = 0
log_connections = on
log_disconnections = on

# --- Dev Safety: auto_explain ---
auto_explain.log_min_duration = '250ms'
auto_explain.log_analyze = true

# --- Auditing ---
# This ensures pgaudit writes every event to the stream we just configured
pgaudit.log = 'all'
pgaudit.log_catalog = off
